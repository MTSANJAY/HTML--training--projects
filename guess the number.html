<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Number Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:900px;
    max-width:95%;
    display:grid;
    grid-template-columns:250px 1fr;
    gap:20px;
}

.sidebar{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:25px;
    color:#38bdf8;
}

.stat{
    background:#334155;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
}

.stat h3{
    font-size:14px;
    color:#cbd5e1;
}

.stat p{
    font-size:24px;
    font-weight:bold;
    margin-top:5px;
}

.main{
    background:#1e293b;
    border-radius:20px;
    padding:30px;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    color:#38bdf8;
}

.feedback{
    text-align:center;
    font-size:22px;
    min-height:40px;
    margin-bottom:20px;
    font-weight:bold;
}

.progress{
    width:100%;
    height:18px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    width:100%;
    height:100%;
    background:#38bdf8;
    transition:.4s;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    font-size:22px;
    text-align:center;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0ea5e9;
}

#resetBtn{
    margin-top:10px;
    display:none;
    background:#22c55e;
}

.history{
    margin-top:25px;
}

.history h3{
    margin-bottom:10px;
}

#historyList{
    max-height:180px;
    overflow:auto;
}

.history-item{
    background:#334155;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🎮 Dashboard</h2>

        <div class="stat">
            <h3>Attempts Left</h3>
            <p id="attempts">10</p>
        </div>

        <div class="stat">
            <h3>High Score</h3>
            <p id="highscore">0</p>
        </div>

        <div class="stat">
            <h3>Range</h3>
            <p>1 - 100</p>
        </div>
    </div>

    <div class="main">

        <div class="title">
            <h1>🎯 Guess The Number</h1>
            <p>Try to find the secret number!</p>
        </div>

        <div class="feedback" id="feedback">
            Start Guessing...
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <input
            type="number"
            id="guessInput"
            placeholder="Enter Number"
            min="1"
            max="100">

        <button id="checkBtn">
            Check Guess
        </button>

        <button id="resetBtn">
            Play Again
        </button>

        <div class="history">
            <h3>📜 Guess History</h3>
            <div id="historyList"></div>
        </div>

    </div>

</div>

<script>

let secretNumber;
let attempts;
const maxAttempts = 10;
let gameOver = false;

let highScore =
Number(localStorage.getItem("highScore")) || 0;

document.getElementById("highscore").textContent =
highScore;

function initGame(){

    secretNumber =
    Math.floor(Math.random()*100)+1;

    attempts = maxAttempts;
    gameOver = false;

    document.getElementById("attempts").textContent =
    attempts;

    document.getElementById("feedback").textContent =
    "Start Guessing...";

    document.getElementById("feedback").style.color =
    "#38bdf8";

    document.getElementById("guessInput").value = "";

    document.getElementById("guessInput").disabled =
    false;

    document.getElementById("historyList").innerHTML =
    "";

    document.getElementById("progressBar").style.width =
    "100%";

    document.getElementById("checkBtn").style.display =
    "block";

    document.getElementById("resetBtn").style.display =
    "none";
}

function addHistory(text){

    const div =
    document.createElement("div");

    div.className = "history-item";

    div.textContent = text;

    document.getElementById("historyList")
    .prepend(div);
}

function endGame(){

    gameOver = true;

    document.getElementById("guessInput").disabled =
    true;

    document.getElementById("checkBtn").style.display =
    "none";

    document.getElementById("resetBtn").style.display =
    "block";
}

function checkGuess(){

    if(gameOver) return;

    const guess =
    parseInt(
        document.getElementById("guessInput").value
    );

    if(isNaN(guess) || guess<1 || guess>100){

        document.getElementById("feedback")
        .textContent =
        "⚠ Enter number between 1 and 100";

        return;
    }

    attempts--;

    document.getElementById("attempts")
    .textContent = attempts;

    document.getElementById("progressBar")
    .style.width =
    (attempts/maxAttempts*100)+"%";

    if(guess === secretNumber){

        document.getElementById("feedback")
        .textContent =
        "🎉 Congratulations! You Won!";

        document.getElementById("feedback")
        .style.color = "#22c55e";

        let score = attempts + 1;

        if(score > highScore){

            highScore = score;

            localStorage.setItem(
                "highScore",
                highScore
            );

            document.getElementById("highscore")
            .textContent =
            highScore;
        }

        addHistory(
        guess + " → Correct"
        );

        endGame();
    }

    else if(attempts <= 0){

        document.getElementById("feedback")
        .textContent =
        "💥 Game Over! Number was " +
        secretNumber;

        document.getElementById("feedback")
        .style.color = "#ef4444";

        endGame();
    }

    else if(guess > secretNumber){

        document.getElementById("feedback")
        .textContent =
        "📉 Too High";

        document.getElementById("feedback")
        .style.color = "#f59e0b";

        addHistory(
        guess + " → Too High"
        );
    }

    else{

        document.getElementById("feedback")
        .textContent =
        "📈 Too Low";

        document.getElementById("feedback")
        .style.color = "#38bdf8";

        addHistory(
        guess + " → Too Low"
        );
    }

    document.getElementById("guessInput")
    .value = "";
}

document.getElementById("checkBtn")
.addEventListener(
    "click",
    checkGuess
);

document.getElementById("resetBtn")
.addEventListener(
    "click",
    initGame
);

document.getElementById("guessInput")
.addEventListener(
    "keydown",
    function(e){
        if(e.key==="Enter"){
            checkGuess();
        }
    }
);

initGame();

</script>

</body>
</html>
