<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login Form</title>
    <style>
        :root {
            --bg: #eef6ff;
            --panel: #ffffff;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
            color: var(--text);
        }

        .login-card {
            width: min(100%, 420px);
            padding: 2rem;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: var(--shadow);
        }

        .login-card h2 {
            margin: 0 0 0.5rem;
            font-size: 2rem;
        }

        .login-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .form-row {
            display: grid;
            gap: 0.5rem;
            margin-top: 1.25rem;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #f8fafc;
            font-size: 1rem;
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .actions {
            display: grid;
            gap: 0.75rem;
            margin-top: 1.75rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-primary {
            color: #ffffff;
            background: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .links {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .note {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.5rem;
            }

            .links {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Student Login</h2>
        <p>Sign in to access your placement dashboard and continue your training progress.</p>

        <form action="#" method="post">
            <div class="form-row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary">Login</button>
                <button type="reset" class="btn-secondary">Clear</button>
            </div>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="register.html">New User? Register Here</a>
            </div>

            <p class="note">Your information stays secure. This form is optimized for both mobile and desktop.</p>
        </form>
    </div>
</body>
</html>
