<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.calculator{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:320px;
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#333;
}

#display{
    width:100%;
    height:60px;
    font-size:24px;
    text-align:right;
    padding:10px;
    border:2px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    outline:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#f1f1f1;
}

.operator{
    background:#6c63ff;
    color:white;
}

.equal{
    background:#28a745;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

.zero{
    grid-column:span 2;
}
</style>
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('(')">(</button>
        <button class="operator" onclick="appendValue(')')">)</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number zero" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let expression = "";

function appendValue(value){
    expression += value;
    document.getElementById("display").value = expression;
}

function calculate(){
    try{
        let result = eval(expression);
        document.getElementById("display").value =
            expression + " = " + result;
        expression = result.toString();
    }
    catch(error){
        document.getElementById("display").value = "Error";
        expression = "";
    }
}

function clearDisplay(){
    expression = "";
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
